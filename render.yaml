services:
  # Python audit engine backend — uses Dockerfile for reliable pip/lxml build
  - type: web
    name: smaidm-ssg-api
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8000"
    healthCheckPath: /health
    autoDeploy: true

  # Node.js platform server (frontend + tRPC API)
  - type: web
    name: smaidm-ssg-platform
    runtime: node
    rootDir: .
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
      - key: NODE_ENV
        value: production
      - key: AUDIT_API_URL
        fromService:
          name: smaidm-ssg-api
          type: web
          property: host
      - key: RESEND_API_KEY
        value: re_CdtMCStJ_Lby6qcjxwWQPjp1repyYgWeM
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
    healthCheckPath: /
    autoDeploy: true
